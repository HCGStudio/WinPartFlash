<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#2b5fb8"/>
      <stop offset="1" stop-color="#153a7a"/>
    </linearGradient>
    <linearGradient id="disk" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#f7f9fc"/>
      <stop offset="1" stop-color="#cfd6e2"/>
    </linearGradient>
    <linearGradient id="bolt" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#ffd94a"/>
      <stop offset="1" stop-color="#ff8a00"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="10"/>
      <feOffset dx="0" dy="12" result="o"/>
      <feComponentTransfer><feFuncA type="linear" slope="0.35"/></feComponentTransfer>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect x="32" y="32" width="960" height="960" rx="200" ry="200" fill="url(#bg)"/>

  <g filter="url(#shadow)">
    <rect x="160" y="232" width="704" height="560" rx="56" ry="56" fill="url(#disk)"/>
    <rect x="160" y="232" width="704" height="120" rx="56" ry="56" fill="#e6ebf3"/>
    <rect x="160" y="292" width="704" height="60" fill="#e6ebf3"/>

    <g fill="#9aa7bd">
      <rect x="216" y="404" width="592" height="52" rx="10"/>
      <rect x="216" y="484" width="408" height="52" rx="10"/>
      <rect x="216" y="564" width="512" height="52" rx="10"/>
      <rect x="216" y="644" width="336" height="52" rx="10"/>
    </g>

    <g fill="#4a6ea8">
      <rect x="216" y="286" width="24" height="12" rx="3"/>
      <rect x="252" y="286" width="60" height="12" rx="3"/>
      <rect x="324" y="286" width="36" height="12" rx="3"/>
    </g>
    <circle cx="816" cy="292" r="12" fill="#34c759"/>
  </g>

  <path d="M600 180 L344 564 L484 564 L420 844 L712 440 L560 440 Z"
        fill="url(#bolt)" stroke="#6a3a00" stroke-width="14" stroke-linejoin="round"/>
</svg>
